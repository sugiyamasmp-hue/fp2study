<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1a3654"/>
  <!-- ears -->
  <polygon points="20,50 8,14 40,36" fill="#0c1e35"/>
  <polygon points="80,50 92,14 60,36" fill="#0c1e35"/>
  <polygon points="22,47 13,21 38,36" fill="#ffb3cb"/>
  <polygon points="78,47 87,21 62,36" fill="#ffb3cb"/>
  <!-- head -->
  <circle cx="50" cy="62" r="31" fill="#0c1e35"/>
  <!-- eyes -->
  <ellipse cx="38" cy="56" rx="7" ry="8" fill="#5bc8f0"/>
  <ellipse cx="62" cy="56" rx="7" ry="8" fill="#5bc8f0"/>
  <ellipse cx="38" cy="57" rx="4" ry="6" fill="#050d1a"/>
  <ellipse cx="62" cy="57" rx="4" ry="6" fill="#050d1a"/>
  <circle cx="40" cy="53" r="2" fill="white"/>
  <circle cx="64" cy="53" r="2" fill="white"/>
  <!-- nose -->
  <polygon points="50,66 47,62 53,62" fill="#ffb3cb"/>
  <!-- mouth -->
  <path d="M46,68 Q50,73 54,68" stroke="#ffb3cb" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- whiskers -->
  <line x1="15" y1="62" x2="42" y2="64" stroke="#5bc8f0" stroke-width="1" opacity="0.55"/>
  <line x1="15" y1="67" x2="42" y2="67" stroke="#5bc8f0" stroke-width="1" opacity="0.55"/>
  <line x1="58" y1="64" x2="85" y2="62" stroke="#5bc8f0" stroke-width="1" opacity="0.55"/>
  <line x1="58" y1="67" x2="85" y2="67" stroke="#5bc8f0" stroke-width="1" opacity="0.55"/>
  <!-- FP badge -->
  <circle cx="80" cy="20" r="13" fill="#0969da"/>
  <text x="80" y="25" text-anchor="middle" font-size="10" font-weight="bold" fill="white" font-family="sans-serif">FP2</text>
</svg>
