<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#fffbe6"/>
  <!-- hat body -->
  <rect x="27" y="5" width="46" height="28" rx="4" fill="#2a2a2a"/>
  <!-- hat brim -->
  <rect x="16" y="31" width="68" height="8" rx="4" fill="#2a2a2a"/>
  <!-- hat band -->
  <rect x="27" y="28" width="46" height="6" fill="#e8b000"/>
  <!-- face -->
  <circle cx="50" cy="66" r="29" fill="#ffd090"/>
  <!-- glasses left circle -->
  <circle cx="37" cy="63" r="11" fill="white" stroke="#333" stroke-width="2.5"/>
  <!-- glasses right circle -->
  <circle cx="63" cy="63" r="11" fill="white" stroke="#333" stroke-width="2.5"/>
  <!-- bridge -->
  <line x1="48" y1="63" x2="52" y2="63" stroke="#333" stroke-width="2.5"/>
  <!-- arms -->
  <line x1="17" y1="63" x2="26" y2="63" stroke="#333" stroke-width="2.5"/>
  <line x1="74" y1="63" x2="83" y2="63" stroke="#333" stroke-width="2.5"/>
  <!-- pupils -->
  <circle cx="37" cy="63" r="5" fill="#1a1a1a"/>
  <circle cx="63" cy="63" r="5" fill="#1a1a1a"/>
  <circle cx="39" cy="61" r="1.5" fill="white"/>
  <circle cx="65" cy="61" r="1.5" fill="white"/>
  <!-- nose -->
  <ellipse cx="50" cy="72" rx="4" ry="3" fill="#e08050"/>
  <!-- big smile -->
  <path d="M38,80 Q50,92 62,80" stroke="#c06030" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
