<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#ff6d00"/>
  <!-- hair -->
  <ellipse cx="50" cy="30" rx="31" ry="22" fill="#c44800"/>
  <!-- face -->
  <circle cx="50" cy="60" r="29" fill="#ffcc8a"/>
  <!-- intense eyebrows -->
  <path d="M29,46 L46,41" stroke="#7a3000" stroke-width="4" stroke-linecap="round"/>
  <path d="M54,41 L71,46" stroke="#7a3000" stroke-width="4" stroke-linecap="round"/>
  <!-- wide open eyes -->
  <circle cx="37" cy="56" r="8" fill="white"/>
  <circle cx="63" cy="56" r="8" fill="white"/>
  <circle cx="37" cy="56" r="5.5" fill="#1a0800"/>
  <circle cx="63" cy="56" r="5.5" fill="#1a0800"/>
  <circle cx="39" cy="54" r="1.8" fill="white"/>
  <circle cx="65" cy="54" r="1.8" fill="white"/>
  <!-- nose -->
  <ellipse cx="50" cy="65" rx="4" ry="3" fill="#e88050"/>
  <!-- shouting mouth -->
  <ellipse cx="50" cy="76" rx="11" ry="8" fill="#7a1800"/>
  <ellipse cx="50" cy="71" rx="10" ry="5" fill="white"/>
  <!-- sweat -->
  <ellipse cx="20" cy="52" rx="3" ry="5" fill="#aaddff" opacity="0.9"/>
  <circle cx="20" cy="47" r="2.5" fill="#aaddff" opacity="0.9"/>
  <!-- fire effect -->
  <ellipse cx="82" cy="18" rx="7" ry="10" fill="#ff4400" opacity="0.7"/>
  <ellipse cx="82" cy="14" rx="4" ry="6" fill="#ffcc00" opacity="0.8"/>
</svg>
