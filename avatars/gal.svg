<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#ff6eb4"/>
  <!-- hair back -->
  <ellipse cx="50" cy="34" rx="35" ry="27" fill="#cc5500"/>
  <!-- hair sides -->
  <rect x="15" y="44" width="14" height="42" rx="7" fill="#cc5500"/>
  <rect x="71" y="44" width="14" height="42" rx="7" fill="#cc5500"/>
  <!-- face -->
  <circle cx="50" cy="62" r="27" fill="#ffe0bb"/>
  <!-- eye shadow -->
  <ellipse cx="37" cy="55" rx="10" ry="5" fill="#c060d8" opacity="0.35"/>
  <ellipse cx="63" cy="55" rx="10" ry="5" fill="#c060d8" opacity="0.35"/>
  <!-- whites -->
  <ellipse cx="37" cy="57" rx="7.5" ry="7" fill="white"/>
  <ellipse cx="63" cy="57" rx="7.5" ry="7" fill="white"/>
  <!-- iris -->
  <circle cx="37" cy="57" r="5.5" fill="#8040e0"/>
  <circle cx="63" cy="57" r="5.5" fill="#8040e0"/>
  <!-- pupils -->
  <circle cx="37" cy="57" r="3" fill="#1a0040"/>
  <circle cx="63" cy="57" r="3" fill="#1a0040"/>
  <!-- highlight -->
  <circle cx="39" cy="55" r="1.5" fill="white"/>
  <circle cx="65" cy="55" r="1.5" fill="white"/>
  <!-- eyelashes top -->
  <line x1="30" y1="51" x2="32" y2="47" stroke="#333" stroke-width="1.5"/>
  <line x1="35" y1="49" x2="36" y2="45" stroke="#333" stroke-width="1.5"/>
  <line x1="40" y1="49" x2="41" y2="45" stroke="#333" stroke-width="1.5"/>
  <line x1="44" y1="51" x2="46" y2="47" stroke="#333" stroke-width="1.5"/>
  <line x1="56" y1="51" x2="55" y2="47" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="49" x2="60" y2="45" stroke="#333" stroke-width="1.5"/>
  <line x1="64" y1="49" x2="65" y2="45" stroke="#333" stroke-width="1.5"/>
  <line x1="68" y1="51" x2="70" y2="47" stroke="#333" stroke-width="1.5"/>
  <!-- blush -->
  <ellipse cx="26" cy="66" rx="7" ry="4" fill="#ff80a8" opacity="0.5"/>
  <ellipse cx="74" cy="66" rx="7" ry="4" fill="#ff80a8" opacity="0.5"/>
  <!-- nose -->
  <circle cx="50" cy="66" r="2.5" fill="#e0a090"/>
  <!-- smile -->
  <path d="M40,74 Q50,83 60,74" stroke="#d04060" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- sparkles -->
  <text x="6" y="28" font-size="14" fill="#ffe000" font-family="sans-serif">★</text>
  <text x="76" y="24" font-size="11" fill="#ffe000" font-family="sans-serif">✦</text>
  <text x="12" y="80" font-size="9" fill="#ffe000" font-family="sans-serif">✦</text>
</svg>
