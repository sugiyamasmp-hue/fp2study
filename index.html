<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クロちゃんとFP2級</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --accent: #58a6ff;
    --kuro-bg: #1c2128;
    --user-bg: #2d333b;
    --text: #e6edf3;
    --muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
  }

  html, body {
    height: 100%;
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ===== LAYOUT ===== */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 760px;
    margin: 0 auto;
  }

  /* ===== HEADER ===== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .kuro-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1f6feb, #388bfd);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  .header-info h1 {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
  }

  .header-info p {
    font-size: 0.75rem;
    color: var(--muted);
  }

  .score-badge {
    background: var(--kuro-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .score-badge span { color: var(--green); font-weight: 700; }

  /* ===== CATEGORY SCREEN ===== */
  #category-screen {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px;
  }

  .cat-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .cat-sub {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .cat-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }

  .cat-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 1rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    text-align: left;
  }

  .cat-btn:hover {
    border-color: var(--accent);
    background: var(--kuro-bg);
  }

  .cat-btn .icon { font-size: 1.2rem; }

  .count-row {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
  }

  .count-label {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .cnt-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }

  .cnt-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d1117;
  }

  /* ===== CHAT AREA ===== */
  #chat-screen {
    display: none;
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    scroll-behavior: smooth;
  }

  .msg-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .msg-row.user {
    flex-direction: row-reverse;
  }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    margin-top: 2px;
  }

  .avatar.kuro {
    background: linear-gradient(135deg, #1f6feb, #388bfd);
  }

  .avatar.user {
    background: linear-gradient(135deg, #238636, #2ea043);
    font-size: 0.85rem;
    font-weight: 700;
    color: white;
  }

  .bubble {
    max-width: calc(100% - 50px);
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 1.05rem;
    line-height: 1.75;
    white-space: pre-line;
  }

  .bubble.kuro {
    background: var(--kuro-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .bubble.user {
    background: var(--user-bg);
    border: 1px solid var(--border);
    border-top-right-radius: 4px;
  }

  .bubble.loading {
    color: var(--muted);
    font-style: italic;
  }

  /* 答えボタン */
  .ans-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .ans-btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }

  .ans-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--kuro-bg);
  }

  .ans-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .next-btn {
    margin-top: 12px;
    padding: 10px 24px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #0d1117;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .next-btn:hover { opacity: 0.85; }

  /* ===== INPUT AREA ===== */
  .input-area {
    display: none;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .chat-input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--kuro-bg);
    color: var(--text);
    font-size: 1.05rem;
    font-family: 'Noto Sans JP', sans-serif;
    resize: none;
    outline: none;
    min-height: 46px;
    max-height: 140px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }

  .chat-input:focus { border-color: var(--accent); }

  .send-btn {
    width: 46px;
    height: 46px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #0d1117;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ===== FINISH ===== */
  #finish-screen {
    display: none;
    flex: 1;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }

  .finish-inner h2 {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--green);
    margin-bottom: 12px;
  }

  .finish-inner p {
    font-size: 1.1rem;
    color: var(--text);
    line-height: 1.8;
    margin-bottom: 28px;
  }

  .finish-btns {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-again {
    padding: 14px 28px;
    border-radius: 10px;
    border: none;
    background: var(--green);
    color: #0d1117;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
  }

  .btn-back {
    padding: 14px 28px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="app">

  <!-- ヘッダー -->
  <div class="header">
    <div class="header-left">
      <div class="kuro-avatar">🐾</div>
      <div class="header-info">
        <h1>クロちゃん</h1>
        <p id="header-sub">FP2級 一緒に合格しよ！</p>
      </div>
    </div>
    <div class="score-badge">正解 <span id="score-disp">0</span> 問</div>
  </div>

  <!-- 分野選択 -->
  <div id="category-screen">
    <p class="cat-title">どの分野から練習する？</p>
    <p class="cat-sub">浩之さん、今日もやってこ！💪</p>

    <div class="cat-list">
      <button class="cat-btn" onclick="startChat('all')"><span class="icon">🎲</span>全分野おまかせ</button>
      <button class="cat-btn" onclick="startChat('ライフ・社会保険,ライフプランニング,社会保険,年金,職業倫理・関連法規')"><span class="icon">📋</span>ライフプランニング・社会保険</button>
      <button class="cat-btn" onclick="startChat('保険')"><span class="icon">🛡️</span>リスク管理・保険</button>
      <button class="cat-btn" onclick="startChat('金融資産運用,金融資産')"><span class="icon">📈</span>金融資産運用</button>
      <button class="cat-btn" onclick="startChat('タックス')"><span class="icon">💰</span>タックスプランニング</button>
      <button class="cat-btn" onclick="startChat('不動産')"><span class="icon">🏠</span>不動産</button>
      <button class="cat-btn" onclick="startChat('相続・事業承継')"><span class="icon">🎁</span>相続・事業承継</button>
      <button class="cat-btn" onclick="startChat('模擬試験')"><span class="icon">📝</span>模擬試験</button>
    </div>

    <p class="count-label">問題数</p>
    <div class="count-row">
      <button class="cnt-btn active" onclick="setCount(5, this)">5問</button>
      <button class="cnt-btn" onclick="setCount(10, this)">10問</button>
      <button class="cnt-btn" onclick="setCount(20, this)">20問</button>
    </div>
  </div>

  <!-- チャット画面 -->
  <div id="chat-screen"></div>

  <!-- 終了画面 -->
  <div id="finish-screen">
    <div class="finish-inner">
      <h2>🎉 お疲れ様！</h2>
      <p id="finish-msg"></p>
      <div class="finish-btns">
        <button class="btn-again" onclick="retryChat()">もう一度！</button>
        <button class="btn-back" onclick="backToMenu()">分野を変える</button>
      </div>
    </div>
  </div>

  <!-- 入力エリア -->
  <div class="input-area" id="input-area">
    <div class="input-row">
      <textarea class="chat-input" id="chat-input" placeholder="クロちゃんに話しかけてや！" rows="1"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMsg()">↑</button>
    </div>
  </div>

</div>

<script>
// ===== STATE =====
let questions = [];
let current = 0;
let score = 0;
let answered = false;
let selectedCount = 5;
let selectedCategory = 'all';
let conversationHistory = [];

// ===== SETUP =====
function setCount(n, btn) {
  selectedCount = n;
  document.querySelectorAll('.cnt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ===== START =====
async function startChat(cat) {
  selectedCategory = cat;
  document.getElementById('category-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'block';
  document.getElementById('input-area').style.display = 'block';
  document.getElementById('finish-screen').style.display = 'none';
  document.getElementById('chat-screen').innerHTML = '';
  conversationHistory = [];
  score = 0;
  current = 0;
  document.getElementById('score-disp').textContent = '0';

  addKuroBubble('よっしゃ！問題読み込み中やで～🐾');

  const catParam = cat === 'all' ? '' : `&category=${encodeURIComponent(cat)}`;
  try {
    const res = await fetch(`/api/questions?limit=${selectedCount}${catParam}`);
    const data = await res.json();
    if (!data.questions || data.questions.length === 0) {
      addKuroBubble('あれ、問題が見つからんかったわ😅 別の分野を試してや！');
      return;
    }
    questions = data.questions;
    document.getElementById('chat-screen').innerHTML = '';
    conversationHistory = [];
    askQuestion();
  } catch(e) {
    addKuroBubble('エラーが出たわ😅 もう一回試してや！');
  }
}

// ===== 問題を出す =====
function askQuestion() {
  if (current >= questions.length) {
    showFinish();
    return;
  }

  answered = false;
  const q = questions[current];
  const optsText = q.opts.map((o, i) => `${i+1}. ${o}`).join('\n');
  const qText = `【問題 ${current+1}／${questions.length}】\n\n${q.q}\n\n${optsText}`;

  addKuroBubble(qText, true, q);
  document.getElementById('header-sub').textContent = `${current+1}問目 / ${questions.length}問`;
  scrollBottom();
}

// ===== クロちゃんのバブル =====
function addKuroBubble(text, showAnswerBtns = false, q = null) {
  const screen = document.getElementById('chat-screen');
  const row = document.createElement('div');
  row.className = 'msg-row';

  const avatar = document.createElement('div');
  avatar.className = 'avatar kuro';
  avatar.textContent = '🐾';

  const bubble = document.createElement('div');
  bubble.className = 'bubble kuro';
  bubble.textContent = text;

  if (showAnswerBtns && q) {
    const btnsDiv = document.createElement('div');
    btnsDiv.className = 'ans-btns';
    btnsDiv.id = 'ans-btns';
    [1,2,3,4].forEach(n => {
      const btn = document.createElement('button');
      btn.className = 'ans-btn';
      btn.textContent = `${n}番`;
      btn.onclick = () => selectAnswer(n-1, q);
      btnsDiv.appendChild(btn);
    });
    bubble.appendChild(btnsDiv);
  }

  row.appendChild(avatar);
  row.appendChild(bubble);
  screen.appendChild(row);
  scrollBottom();
}

// ===== ユーザーのバブル =====
function addUserBubble(text) {
  const screen = document.getElementById('chat-screen');
  const row = document.createElement('div');
  row.className = 'msg-row user';

  const avatar = document.createElement('div');
  avatar.className = 'avatar user';
  avatar.textContent = '浩';

  const bubble = document.createElement('div');
  bubble.className = 'bubble user';
  bubble.textContent = text;

  row.appendChild(avatar);
  row.appendChild(bubble);
  screen.appendChild(row);
  scrollBottom();
}

// ===== 答えを選ぶ =====
function selectAnswer(idx, q) {
  if (answered) return;
  answered = true;

  // ボタン無効化
  document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);

  const correctIdx = Number(q.ans);
  addUserBubble(`${idx+1}番！`);

  conversationHistory.push({ role: 'user', content: `${idx+1}番` });

  if (idx === correctIdx) {
    score++;
    document.getElementById('score-disp').textContent = score;
    const reply = `🎉 正解やで！さすが浩之さん！\n\n📝 ${q.ex}\n\n次の問題いく？`;
    addKuroBubble(reply, false);
    conversationHistory.push({ role: 'assistant', content: reply });
  } else {
    const reply = `😅 惜しい！正解は${correctIdx+1}番やで！\n\n📝 ${q.ex}\n\n次の問題いく？`;
    addKuroBubble(reply, false);
    conversationHistory.push({ role: 'assistant', content: reply });
  }

  // 次へボタン
  const screen = document.getElementById('chat-screen');
  const nextBtn = document.createElement('button');
  nextBtn.className = 'next-btn';
  nextBtn.id = 'next-q-btn';
  nextBtn.textContent = current+1 < questions.length ? '次の問題へ →' : '結果を見る！';
  nextBtn.onclick = () => {
    nextBtn.remove();
    current++;
    askQuestion();
  };
  screen.appendChild(nextBtn);
  scrollBottom();
}

// ===== 自由入力を送信 =====
async function sendMsg() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  // 数字で答えた場合
  if (['1','2','3','4'].includes(text) && !answered && questions[current]) {
    input.value = '';
    selectAnswer(Number(text)-1, questions[current]);
    return;
  }

  addUserBubble(text);
  input.value = '';
  input.style.height = 'auto';

  const sendBtn = document.getElementById('send-btn');
  sendBtn.disabled = true;

  // ローディング
  const screen = document.getElementById('chat-screen');
  const loadRow = document.createElement('div');
  loadRow.className = 'msg-row';
  loadRow.id = 'loading-row';
  const loadAvatar = document.createElement('div');
  loadAvatar.className = 'avatar kuro';
  loadAvatar.textContent = '🐾';
  const loadBubble = document.createElement('div');
  loadBubble.className = 'bubble kuro loading';
  loadBubble.textContent = '考え中やで～🐾';
  loadRow.appendChild(loadAvatar);
  loadRow.appendChild(loadBubble);
  screen.appendChild(loadRow);
  scrollBottom();

  conversationHistory.push({ role: 'user', content: text });

  const currentQ = questions[current] || questions[questions.length-1];
  const systemPrompt = `あなたは「クロちゃん」というFP2級の先生キャラクターです。
必ず関西弁で話す。「〜やで」「〜やん」「〜やな」「〜やろ」を使う。
「です」「ます」は絶対使わない。絵文字を適度に使って明るく！
FP2級の知識は正確に伝える。短めにわかりやすく答える。
今取り組んでいる問題：「${currentQ ? currentQ.q : ''}」
解説：「${currentQ ? currentQ.ex : ''}」`;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: systemPrompt,
        messages: conversationHistory
      })
    });
    const data = await res.json();
    document.getElementById('loading-row')?.remove();
    const reply = data.reply || 'ごめん、エラーやわ😅';
    addKuroBubble(reply);
    conversationHistory.push({ role: 'assistant', content: reply });
  } catch(e) {
    document.getElementById('loading-row')?.remove();
    addKuroBubble('ごめん、エラーやわ😅もう一回聞いてや！');
  }

  sendBtn.disabled = false;
}

// ===== 終了 =====
function showFinish() {
  document.getElementById('chat-screen').style.display = 'none';
  document.getElementById('input-area').style.display = 'none';
  const fs = document.getElementById('finish-screen');
  fs.style.display = 'flex';

  const pct = Math.round(score / questions.length * 100);
  let msg = '';
  if (pct === 100) msg = `全問正解！！${questions.length}問中${score}問(${pct}%)🔥\nこの調子で10月の本番も突破やで！`;
  else if (pct >= 60) msg = `${questions.length}問中${score}問正解(${pct}%)！\nええ感じやで！間違えた問題を復習したら完璧や！`;
  else msg = `${questions.length}問中${score}問正解(${pct}%)。\n一緒にもう一回やり直そ！絶対できるようになるで！`;
  document.getElementById('finish-msg').textContent = msg;
}

function retryChat() {
  document.getElementById('finish-screen').style.display = 'none';
  startChat(selectedCategory);
}

function backToMenu() {
  document.getElementById('finish-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'none';
  document.getElementById('input-area').style.display = 'none';
  document.getElementById('category-screen').style.display = 'block';
  document.getElementById('header-sub').textContent = 'FP2級 一緒に合格しよ！';
  document.getElementById('score-disp').textContent = '0';
}

function scrollBottom() {
  const screen = document.getElementById('chat-screen');
  screen.scrollTop = screen.scrollHeight;
}

// ===== テキストエリア自動リサイズ =====
const input = document.getElementById('chat-input');
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 140) + 'px';
});
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
});
</script>
</body>
</html>
