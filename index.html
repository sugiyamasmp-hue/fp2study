<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FP2級 クロちゃんと一問一答</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

  :root {
    --bg: #0f1923;
    --card: #1a2840;
    --accent: #00c9a7;
    --accent2: #ff6b6b;
    --yellow: #ffd166;
    --text: #f0f4ff;
    --muted: #8899bb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
    text-align: center;
  }

  .subtitle {
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 28px;
    text-align: center;
  }

  .card {
    background: var(--card);
    border-radius: 20px;
    padding: 28px 24px;
    max-width: 680px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    margin-bottom: 20px;
  }

  .question-label {
    font-size: 0.95rem;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 14px;
    letter-spacing: 0.1em;
  }

  .question-text {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.8;
    margin-bottom: 28px;
    color: var(--text);
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .choice-btn {
    background: #243552;
    border: 2px solid #2e4470;
    border-radius: 14px;
    padding: 18px 20px;
    font-size: 1.15rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1.6;
  }

  .choice-btn:hover:not(:disabled) {
    background: #2e4d7a;
    border-color: var(--accent);
    transform: translateX(4px);
  }

  .choice-btn.correct {
    background: #0d3d2e;
    border-color: var(--accent);
    color: var(--accent);
  }

  .choice-btn.wrong {
    background: #3d1a1a;
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .choice-btn.reveal {
    background: #0d3d2e;
    border-color: var(--accent);
    color: var(--accent);
  }

  .result-box {
    display: none;
    margin-top: 24px;
    padding: 20px;
    border-radius: 14px;
    font-size: 1.1rem;
    line-height: 1.8;
    font-weight: 700;
  }

  .result-box.correct-result {
    background: #0d3d2e;
    border: 2px solid var(--accent);
    color: var(--accent);
  }

  .result-box.wrong-result {
    background: #2a1a0d;
    border: 2px solid var(--yellow);
    color: var(--yellow);
  }

  .explanation {
    display: none;
    margin-top: 16px;
    padding: 20px;
    background: #1e2e4a;
    border-radius: 14px;
    font-size: 1.05rem;
    line-height: 1.9;
    color: #ccd9f0;
    border-left: 4px solid var(--accent);
  }

  .next-btn {
    display: none;
    margin-top: 20px;
    width: 100%;
    padding: 18px;
    background: var(--accent);
    color: #0f1923;
    border: none;
    border-radius: 14px;
    font-size: 1.2rem;
    font-weight: 900;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s;
  }

  .next-btn:hover { opacity: 0.85; }

  .score-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    font-size: 1rem;
    color: var(--muted);
    font-weight: 700;
  }

  .score-bar span { color: var(--yellow); }

  .kuro-icon {
    font-size: 2rem;
    margin-right: 8px;
  }

  .finish-card {
    display: none;
    text-align: center;
    padding: 40px 24px;
  }

  .finish-card h2 {
    font-size: 2rem;
    font-weight: 900;
    color: var(--yellow);
    margin-bottom: 12px;
  }

  .finish-card p {
    font-size: 1.2rem;
    color: var(--text);
    line-height: 1.8;
  }

  .restart-btn {
    margin-top: 28px;
    padding: 16px 40px;
    background: var(--yellow);
    color: #0f1923;
    border: none;
    border-radius: 14px;
    font-size: 1.15rem;
    font-weight: 900;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
  }

  /* クロちゃん質問エリア */
  .chat-area {
    display: none;
    margin-top: 20px;
    background: #111e30;
    border-radius: 16px;
    padding: 20px;
    border: 2px solid #2e4470;
  }

  .chat-label {
    font-size: 1.05rem;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 14px;
  }

  .chat-messages {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 16px;
    max-height: 320px;
    overflow-y: auto;
  }

  .chat-bubble {
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 1.1rem;
    line-height: 1.8;
    font-weight: 500;
  }

  .chat-bubble.kuro {
    background: #1a3a5c;
    color: var(--text);
    border-left: 4px solid var(--accent);
  }

  .chat-bubble.user {
    background: #243552;
    color: var(--text);
    border-left: 4px solid var(--yellow);
    text-align: right;
  }

  .chat-bubble.loading {
    background: #1a3a5c;
    color: var(--muted);
    font-style: italic;
  }

  .chat-input-row {
    display: flex;
    gap: 10px;
  }

  .chat-input {
    flex: 1;
    padding: 16px 18px;
    font-size: 1.1rem;
    font-family: 'Noto Sans JP', sans-serif;
    background: #1a2840;
    border: 2px solid #2e4470;
    border-radius: 12px;
    color: var(--text);
    outline: none;
  }

  .chat-input:focus {
    border-color: var(--accent);
  }

  .chat-send-btn {
    padding: 16px 22px;
    background: var(--accent);
    color: #0f1923;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 900;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    white-space: nowrap;
  }

  .chat-send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
</style>
</head>
<body>

<h1>🐾 クロちゃんと FP2級 一問一答</h1>
<p class="subtitle">ライフプランニング・社会保険編</p>

<div class="score-bar">
  問題 <span id="q-num">1</span> / <span id="q-total">3</span>　｜　正解 <span id="score">0</span> 問
</div>

<div class="card" id="quiz-card">
  <div class="question-label" id="q-label">📋 問題 1</div>
  <div class="question-text" id="q-text"></div>
  <div class="choices" id="choices"></div>
  <div class="result-box" id="result-box"></div>
  <div class="explanation" id="explanation"></div>

  <div class="chat-area" id="chat-area">
    <div class="chat-label">🐾 クロちゃんに質問する</div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-bubble kuro">なんか気になることあったら何でも聞いてや！🐾</div>
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" type="text" placeholder="なんでも聞いてや！" />
      <button class="chat-send-btn" id="chat-send-btn" onclick="sendQuestion()">送信</button>
    </div>
  </div>

  <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ →</button>
</div>

<div class="card finish-card" id="finish-card">
  <h2>🎉 お疲れ様！</h2>
  <p id="finish-msg"></p>
  <button class="restart-btn" onclick="restart()">もう一度チャレンジ！</button>
</div>

<script>
const questions = [
  {
    text: "雇用保険の基本手当に関する記述のうち、最も不適切なものはどれか？",
    choices: [
      "一般被保険者が失業した場合、原則として離職の日以前2年間に被保険者期間が通算12カ月以上あることが必要",
      "育児休業給付金は通算181日目以降、「休業開始時賃金日額×支給日数×67%」相当額が支給される",
      "介護休業給付金は同一の対象家族について通算3回かつ93日を限度として支給される",
      "失業等給付・育児休業給付の保険料は労使折半、雇用保険二事業の保険料は事業主が全額負担"
    ],
    correct: 1,
    explanation: "181日目以降の育児休業給付金は「67%」ではなく「50%」が正解！\n\n開始〜180日目 → 67%\n181日目以降 → 50%\n\n最初はがっつりもらえるけど、だんだん減るイメージやで！"
  },
  {
    text: "公的医療保険に関する記述のうち、最も不適切なものはどれか？",
    choices: [
      "健康保険の任意継続被保険者になるには、資格喪失前に引き続き2カ月以上被保険者で、資格喪失日から20日以内に申請が必要",
      "健康保険や国民健康保険の被保険者が75歳になると後期高齢者医療制度の被保険者となる",
      "同一月内に自己負担限度額を超えた場合、超えた部分が高額療養費として支給される",
      "協会けんぽの介護保険料率は都道府県ごとに定められている"
    ],
    correct: 3,
    explanation: "協会けんぽの介護保険料率は「都道府県ごと」ではなく「全国一律」やで！\n\n一般保険料率 → 都道府県ごとに異なる\n介護保険料率 → 全国一律\n\n「介護は全国みんな同じ」って覚えといて！"
  },
  {
    text: "労働者災害補償保険（労災保険）の給付に関する記述のうち、最も適切なものはどれか？",
    choices: [
      "労災保険の適用を受ける労働者には、日雇労働者や外国人労働者は含まれない",
      "業務上の負傷で賃金を受けられない場合、賃金を受けられない日の第4日目から休業補償給付が支給される",
      "労災保険の保険料率は事業の種類による差異はない",
      "障害補償年金と障害補償一時金はどちらかを選択して受給できる"
    ],
    correct: 1,
    explanation: "正解は2番！待期期間が3日あって、4日目から支給されるんよ。\n\n1番→日雇・外国人も対象やで\n3番→事業の種類によって保険料率は異なる\n4番→障害等級によって年金か一時金が決まり、選択制ではない\n\n「3日待って4日目から」ってしっかり覚えといて！"
  }
];

let current = 0;
let score = 0;
let answered = false;

function loadQuestion() {
  const q = questions[current];
  answered = false;
  document.getElementById('q-label').textContent = `📋 問題 ${current + 1}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-num').textContent = current + 1;
  document.getElementById('q-total').textContent = questions.length;
  document.getElementById('score').textContent = score;

  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = `${i + 1}. ${c}`;
    btn.onclick = () => answer(i);
    choicesDiv.appendChild(btn);
  });

  document.getElementById('result-box').style.display = 'none';
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('chat-area').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
}

function answer(idx) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);

  const resultBox = document.getElementById('result-box');
  const expBox = document.getElementById('explanation');

  if (idx === q.correct) {
    score++;
    btns[idx].classList.add('correct');
    resultBox.className = 'result-box correct-result';
    resultBox.textContent = '🎉 正解！さすが浩之さん！';
  } else {
    btns[idx].classList.add('wrong');
    btns[q.correct].classList.add('reveal');
    resultBox.className = 'result-box wrong-result';
    resultBox.textContent = `😅 惜しい！正解は ${q.correct + 1} 番やで！`;
  }

  document.getElementById('score').textContent = score;
  resultBox.style.display = 'block';
  expBox.textContent = q.explanation;
  expBox.style.display = 'block';
  document.getElementById('chat-area').style.display = 'block';
  // チャット履歴リセット
  document.getElementById('chat-messages').innerHTML = '<div class="chat-bubble kuro">なんか気になることあったら何でも聞いてや！🐾</div>';
  document.getElementById('next-btn').style.display = 'block';

  document.getElementById('chat-input').onkeydown = (e) => {
    if (e.key === 'Enter') sendQuestion();
  };
}

async function sendQuestion() {
  const input = document.getElementById('chat-input');
  const q = input.value.trim();
  if (!q) return;

  const messages = document.getElementById('chat-messages');
  const sendBtn = document.getElementById('chat-send-btn');

  const userBubble = document.createElement('div');
  userBubble.className = 'chat-bubble user';
  userBubble.textContent = q;
  messages.appendChild(userBubble);
  input.value = '';
  sendBtn.disabled = true;

  const loading = document.createElement('div');
  loading.className = 'chat-bubble loading';
  loading.textContent = 'クロちゃんが考え中やで～🐾';
  messages.appendChild(loading);
  messages.scrollTop = messages.scrollHeight;

  const currentQ = questions[current] || questions[questions.length - 1];

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: `あなたは「クロちゃん」というFP2級の先生です。関西弁でフレンドリーに、でも正確に答えてください。今取り組んでいる問題：「${currentQ.text}」。解説：「${currentQ.explanation}」。この問題に関連した質問に答えてあげてください。短めにわかりやすく！`,
        messages: [{ role: 'user', content: q }]
      })
    });
    const data = await res.json();
    loading.remove();
    const kuroBubble = document.createElement('div');
    kuroBubble.className = 'chat-bubble kuro';
    kuroBubble.textContent = data.reply;
    messages.appendChild(kuroBubble);
  } catch(e) {
    loading.remove();
    const errBubble = document.createElement('div');
    errBubble.className = 'chat-bubble kuro';
    errBubble.textContent = 'ごめん、ちょっとエラーやわ😅もう一回聞いてや！';
    messages.appendChild(errBubble);
  }

  sendBtn.disabled = false;
  messages.scrollTop = messages.scrollHeight;
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showFinish();
  } else {
    loadQuestion();
  }
}

function showFinish() {
  document.getElementById('quiz-card').style.display = 'none';
  document.querySelector('.score-bar').style.display = 'none';
  const fc = document.getElementById('finish-card');
  fc.style.display = 'block';
  const pct = Math.round(score / questions.length * 100);
  let msg = '';
  if (pct === 100) msg = `全問正解！！${questions.length}問中${score}問正解(${pct}%)🔥\nクロちゃんも鼻高々やで！この調子で10月の本番も突破や！`;
  else if (pct >= 60) msg = `${questions.length}問中${score}問正解(${pct}%)！\nええ感じやで！間違えた問題を復習したら完璧や！`;
  else msg = `${questions.length}問中${score}問正解(${pct}%)。\n一緒にもう一回やり直そ！絶対できるようになるで！`;
  document.getElementById('finish-msg').textContent = msg;
}

function restart() {
  current = 0;
  score = 0;
  document.getElementById('quiz-card').style.display = 'block';
  document.querySelector('.score-bar').style.display = 'flex';
  document.getElementById('finish-card').style.display = 'none';
  loadQuestion();
}

loadQuestion();
</script>
</body>
</html>
