<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FP2級 クロちゃんと一問一答</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

  :root {
    --bg: #0f1923;
    --card: #1a2840;
    --accent: #00c9a7;
    --accent2: #ff6b6b;
    --yellow: #ffd166;
    --text: #f0f4ff;
    --muted: #8899bb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
    text-align: center;
  }

  .subtitle {
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 28px;
    text-align: center;
  }

  .card {
    background: var(--card);
    border-radius: 20px;
    padding: 28px 24px;
    max-width: 680px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    margin-bottom: 20px;
  }

  /* 分野選択画面 */
  .category-title {
    font-size: 1.2rem;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 20px;
    text-align: center;
  }

  .category-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .category-btn {
    background: #243552;
    border: 2px solid #2e4470;
    border-radius: 14px;
    padding: 20px 24px;
    font-size: 1.15rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .category-btn:hover {
    background: #2e4d7a;
    border-color: var(--accent);
    transform: translateX(4px);
  }

  .category-btn .icon { font-size: 1.4rem; }

  /* 問題数選択 */
  .count-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .count-btn {
    padding: 12px 24px;
    background: #243552;
    border: 2px solid #2e4470;
    border-radius: 10px;
    font-size: 1.05rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }

  .count-btn.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f1923;
  }

  .start-btn {
    margin-top: 20px;
    width: 100%;
    padding: 18px;
    background: var(--accent);
    color: #0f1923;
    border: none;
    border-radius: 14px;
    font-size: 1.2rem;
    font-weight: 900;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .start-btn:hover { opacity: 0.85; }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ローディング */
  .loading-box {
    text-align: center;
    padding: 40px;
    font-size: 1.2rem;
    color: var(--muted);
  }

  /* クイズ画面 */
  .question-label {
    font-size: 0.95rem;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 14px;
    letter-spacing: 0.1em;
  }

  .question-text {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.8;
    margin-bottom: 28px;
    color: var(--text);
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .choice-btn {
    background: #243552;
    border: 2px solid #2e4470;
    border-radius: 14px;
    padding: 18px 20px;
    font-size: 1.15rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1.6;
  }

  .choice-btn:hover:not(:disabled) {
    background: #2e4d7a;
    border-color: var(--accent);
    transform: translateX(4px);
  }

  .choice-btn.correct {
    background: #0d3d2e;
    border-color: var(--accent);
    color: var(--accent);
  }

  .choice-btn.wrong {
    background: #3d1a1a;
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .choice-btn.reveal {
    background: #0d3d2e;
    border-color: var(--accent);
    color: var(--accent);
  }

  .result-box {
    display: none;
    margin-top: 24px;
    padding: 20px;
    border-radius: 14px;
    font-size: 1.1rem;
    line-height: 1.8;
    font-weight: 700;
  }

  .result-box.correct-result {
    background: #0d3d2e;
    border: 2px solid var(--accent);
    color: var(--accent);
  }

  .result-box.wrong-result {
    background: #2a1a0d;
    border: 2px solid var(--yellow);
    color: var(--yellow);
  }

  .explanation {
    display: none;
    margin-top: 16px;
    padding: 20px;
    background: #1e2e4a;
    border-radius: 14px;
    font-size: 1.05rem;
    line-height: 1.9;
    color: #ccd9f0;
    border-left: 4px solid var(--accent);
    white-space: pre-line;
  }

  .next-btn {
    display: none;
    margin-top: 20px;
    width: 100%;
    padding: 18px;
    background: var(--yellow);
    color: #0f1923;
    border: none;
    border-radius: 14px;
    font-size: 1.2rem;
    font-weight: 900;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .next-btn:hover { opacity: 0.85; }

  .score-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    font-size: 1rem;
    color: var(--muted);
    font-weight: 700;
    max-width: 680px;
    width: 100%;
  }

  .score-bar span { color: var(--yellow); }

  /* クロちゃん質問エリア */
  .chat-area {
    display: none;
    margin-top: 20px;
    background: #111e30;
    border-radius: 16px;
    padding: 20px;
    border: 2px solid #2e4470;
  }

  .chat-label {
    font-size: 1.05rem;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 14px;
  }

  .chat-messages {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 16px;
    max-height: 320px;
    overflow-y: auto;
  }

  .chat-bubble {
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 1.1rem;
    line-height: 1.8;
    font-weight: 500;
    white-space: pre-line;
  }

  .chat-bubble.kuro {
    background: #1a3a5c;
    color: var(--text);
    border-left: 4px solid var(--accent);
  }

  .chat-bubble.user {
    background: #243552;
    color: var(--text);
    border-left: 4px solid var(--yellow);
  }

  .chat-bubble.loading {
    background: #1a3a5c;
    color: var(--muted);
    font-style: italic;
  }

  .chat-input-row {
    display: flex;
    gap: 10px;
  }

  .chat-input {
    flex: 1;
    padding: 16px 18px;
    font-size: 1.1rem;
    font-family: 'Noto Sans JP', sans-serif;
    background: #1a2840;
    border: 2px solid #2e4470;
    border-radius: 12px;
    color: var(--text);
    outline: none;
  }

  .chat-input:focus { border-color: var(--accent); }

  .chat-send-btn {
    padding: 16px 22px;
    background: var(--accent);
    color: #0f1923;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 900;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    white-space: nowrap;
  }

  .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* 終了画面 */
  .finish-card {
    display: none;
    text-align: center;
    padding: 40px 24px;
  }

  .finish-card h2 {
    font-size: 2rem;
    font-weight: 900;
    color: var(--yellow);
    margin-bottom: 12px;
  }

  .finish-card p {
    font-size: 1.2rem;
    color: var(--text);
    line-height: 1.8;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .restart-btn {
    flex: 1;
    padding: 16px;
    background: var(--yellow);
    color: #0f1923;
    border: none;
    border-radius: 14px;
    font-size: 1.1rem;
    font-weight: 900;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
  }

  .back-btn {
    flex: 1;
    padding: 16px;
    background: #243552;
    color: var(--text);
    border: 2px solid #2e4470;
    border-radius: 14px;
    font-size: 1.1rem;
    font-weight: 900;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>🐾 クロちゃんと FP2級 一問一答</h1>
<p class="subtitle" id="main-subtitle">分野を選んでスタート！</p>

<!-- 分野選択画面 -->
<div class="card" id="category-screen">
  <div class="category-title">📚 どの分野を練習する？</div>
  <div class="category-grid">
    <button class="category-btn" onclick="selectCategory('all')">
      <span class="icon">🎲</span>全分野おまかせ
    </button>
    <button class="category-btn" onclick="selectCategory('ライフ・社会保険,ライフプランニング,社会保険,年金,職業倫理・関連法規')">
      <span class="icon">📋</span>ライフプランニング・社会保険
    </button>
    <button class="category-btn" onclick="selectCategory('保険')">
      <span class="icon">🛡️</span>リスク管理・保険
    </button>
    <button class="category-btn" onclick="selectCategory('金融資産運用,金融資産')">
      <span class="icon">📈</span>金融資産運用
    </button>
    <button class="category-btn" onclick="selectCategory('タックス')">
      <span class="icon">💰</span>タックスプランニング
    </button>
    <button class="category-btn" onclick="selectCategory('不動産')">
      <span class="icon">🏠</span>不動産
    </button>
    <button class="category-btn" onclick="selectCategory('相続・事業承継')">
      <span class="icon">🎁</span>相続・事業承継
    </button>
    <button class="category-btn" onclick="selectCategory('模擬試験')">
      <span class="icon">📝</span>模擬試験問題
    </button>
  </div>

  <div class="count-row">
    <button class="count-btn selected" onclick="selectCount(5)">5問</button>
    <button class="count-btn" onclick="selectCount(10)">10問</button>
    <button class="count-btn" onclick="selectCount(20)">20問</button>
  </div>
</div>

<!-- ローディング -->
<div class="card" id="loading-screen" style="display:none;">
  <div class="loading-box">🐾 問題を読み込み中やで～...</div>
</div>

<!-- スコアバー -->
<div class="score-bar" id="score-bar" style="display:none;">
  問題 <span id="q-num">1</span> / <span id="q-total">10</span>　｜　正解 <span id="score">0</span> 問
</div>

<!-- クイズ画面 -->
<div class="card" id="quiz-card" style="display:none;">
  <div class="question-label" id="q-label">📋 問題 1</div>
  <div class="question-text" id="q-text"></div>
  <div class="choices" id="choices"></div>
  <div class="result-box" id="result-box"></div>
  <div class="explanation" id="explanation"></div>

  <div class="chat-area" id="chat-area">
    <div class="chat-label">🐾 クロちゃんに質問する</div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-bubble kuro">なんか気になることあったら何でも聞いてや！🐾</div>
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" type="text" placeholder="なんでも聞いてや！" />
      <button class="chat-send-btn" id="chat-send-btn" onclick="sendQuestion()">送信</button>
    </div>
  </div>

  <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ →</button>
</div>

<!-- 終了画面 -->
<div class="card finish-card" id="finish-card">
  <h2>🎉 お疲れ様！</h2>
  <p id="finish-msg"></p>
  <div class="btn-row">
    <button class="restart-btn" onclick="restartSameCategory()">もう一度！</button>
    <button class="back-btn" onclick="backToCategory()">分野を変える</button>
  </div>
</div>

<script>
let questions = [];
let current = 0;
let score = 0;
let answered = false;
let selectedCategory = 'all';
let selectedCount = 5;

function selectCount(n) {
  selectedCount = n;
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('selected'));
  event.target.classList.add('selected');
}

async function selectCategory(cat) {
  selectedCategory = cat;
  document.getElementById('category-screen').style.display = 'none';
  document.getElementById('loading-screen').style.display = 'block';
  document.getElementById('main-subtitle').textContent = cat === 'all' ? '全分野' : cat;

  await loadQuestions();
}

async function loadQuestions() {
  try {
    const catParam = selectedCategory === 'all' ? '' : `&category=${encodeURIComponent(selectedCategory)}`;
    const res = await fetch(`/api/questions?limit=${selectedCount}${catParam}`);
    const data = await res.json();

    if (!data.questions || data.questions.length === 0) {
      alert('問題が見つからんかったわ！別の分野を試してや！');
      backToCategory();
      return;
    }

    questions = data.questions;
    current = 0;
    score = 0;

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('score-bar').style.display = 'flex';
    document.getElementById('quiz-card').style.display = 'block';
    document.getElementById('q-total').textContent = questions.length;

    loadQuestion();
  } catch(e) {
    alert('エラーが出たわ！もう一回試してや！');
    backToCategory();
  }
}

function loadQuestion() {
  const q = questions[current];
  answered = false;

  document.getElementById('q-label').textContent = `📋 問題 ${current + 1}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-num').textContent = current + 1;
  document.getElementById('score').textContent = score;

  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';
  q.opts.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = `${i + 1}. ${c}`;
    btn.onclick = () => answer(i);
    choicesDiv.appendChild(btn);
  });

  document.getElementById('result-box').style.display = 'none';
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('chat-area').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
}

function answer(idx) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);

  const correctIdx = Number(q.ans);
  const resultBox = document.getElementById('result-box');
  const expBox = document.getElementById('explanation');

  if (idx === correctIdx) {
    score++;
    btns[idx].classList.add('correct');
    resultBox.className = 'result-box correct-result';
    resultBox.textContent = '🎉 正解！さすが浩之さん！';
  } else {
    btns[idx].classList.add('wrong');
    btns[correctIdx].classList.add('reveal');
    resultBox.className = 'result-box wrong-result';
    resultBox.textContent = `😅 惜しい！正解は ${correctIdx + 1} 番やで！`;
  }

  document.getElementById('score').textContent = score;
  resultBox.style.display = 'block';
  expBox.textContent = q.ex || '';
  expBox.style.display = 'block';
  document.getElementById('chat-area').style.display = 'block';
  document.getElementById('chat-messages').innerHTML = '<div class="chat-bubble kuro">なんか気になることあったら何でも聞いてや！🐾</div>';
  document.getElementById('next-btn').style.display = 'block';

  document.getElementById('chat-input').onkeydown = (e) => {
    if (e.key === 'Enter') sendQuestion();
  };
}

async function sendQuestion() {
  const input = document.getElementById('chat-input');
  const q = input.value.trim();
  if (!q) return;

  const messages = document.getElementById('chat-messages');
  const sendBtn = document.getElementById('chat-send-btn');

  const userBubble = document.createElement('div');
  userBubble.className = 'chat-bubble user';
  userBubble.textContent = q;
  messages.appendChild(userBubble);
  input.value = '';
  sendBtn.disabled = true;

  const loading = document.createElement('div');
  loading.className = 'chat-bubble loading';
  loading.textContent = 'クロちゃんが考え中やで～🐾';
  messages.appendChild(loading);
  messages.scrollTop = messages.scrollHeight;

  const currentQ = questions[current];

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: `あなたは「クロちゃん」というFP2級の先生です。関西弁でフレンドリーに、でも正確に答えてください。今取り組んでいる問題：「${currentQ.q}」。解説：「${currentQ.ex}」。この問題に関連した質問に答えてあげてください。短めにわかりやすく！`,
        messages: [{ role: 'user', content: q }]
      })
    });
    const data = await res.json();
    loading.remove();
    const kuroBubble = document.createElement('div');
    kuroBubble.className = 'chat-bubble kuro';
    kuroBubble.textContent = data.reply;
    messages.appendChild(kuroBubble);
  } catch(e) {
    loading.remove();
    const errBubble = document.createElement('div');
    errBubble.className = 'chat-bubble kuro';
    errBubble.textContent = 'ごめん、ちょっとエラーやわ😅もう一回聞いてや！';
    messages.appendChild(errBubble);
  }

  sendBtn.disabled = false;
  messages.scrollTop = messages.scrollHeight;
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showFinish();
  } else {
    loadQuestion();
  }
}

function showFinish() {
  document.getElementById('quiz-card').style.display = 'none';
  document.getElementById('score-bar').style.display = 'none';
  const fc = document.getElementById('finish-card');
  fc.style.display = 'block';
  const pct = Math.round(score / questions.length * 100);
  let msg = '';
  if (pct === 100) msg = `全問正解！！${questions.length}問中${score}問正解(${pct}%)🔥\nこの調子で10月の本番も突破や！`;
  else if (pct >= 60) msg = `${questions.length}問中${score}問正解(${pct}%)！\nええ感じやで！間違えた問題を復習したら完璧や！`;
  else msg = `${questions.length}問中${score}問正解(${pct}%)。\n一緒にもう一回やり直そ！絶対できるようになるで！`;
  document.getElementById('finish-msg').textContent = msg;
}

function restartSameCategory() {
  document.getElementById('finish-card').style.display = 'none';
  document.getElementById('loading-screen').style.display = 'block';
  document.getElementById('score-bar').style.display = 'none';
  loadQuestions();
}

function backToCategory() {
  document.getElementById('finish-card').style.display = 'none';
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('quiz-card').style.display = 'none';
  document.getElementById('score-bar').style.display = 'none';
  document.getElementById('category-screen').style.display = 'block';
  document.getElementById('main-subtitle').textContent = '分野を選んでスタート！';
}
</script>
</body>
</html>
