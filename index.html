<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AID式学習法 FP2級</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#f0f0f0;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;min-height:100vh}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(255,140,0,0.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(255,80,80,0.06) 0%,transparent 60%);pointer-events:none;z-index:0}
.container{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:20px 16px 40px}

/* ロゴ */
.logo-wrap{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-top:8px}
.logo-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#ff8c00,#ff4500);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#fff;box-shadow:0 4px 20px rgba(255,140,0,0.4)}
.logo-title{font-size:20px;font-weight:800;color:#fff}
.logo-sub{font-size:11px;color:#ff8c00;letter-spacing:0.1em;font-weight:600}

/* カード */
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:24px 20px;margin-bottom:16px}
.tag-row{display:flex;gap:8px;margin-bottom:16px}
.tag{background:rgba(255,140,0,0.15);border:1px solid rgba(255,140,0,0.3);color:#ff8c00;border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700}
.hero-text{font-size:28px;font-weight:900;color:#fff;line-height:1.2}
.hero-text2{font-size:32px;font-weight:900;background:linear-gradient(90deg,#ff8c00,#ff4500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.hero-sub{font-size:13px;color:#888;margin-bottom:20px}
.stats-row{display:flex;align-items:center;background:rgba(255,255,255,0.04);border-radius:12px;padding:14px 0;margin-bottom:20px}
.stat{flex:1;text-align:center}
.stat-num{font-size:22px;font-weight:800;color:#ff8c00}
.stat-label{font-size:11px;color:#666;margin-top:2px}
.stat-divider{width:1px;height:30px;background:rgba(255,255,255,0.08)}
.start-btn{width:100%;padding:14px 0;background:linear-gradient(135deg,#ff8c00,#ff4500);border:none;border-radius:14px;color:#fff;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(255,140,0,0.35);margin-bottom:10px}
.start-btn:hover{opacity:0.9}
.outline-btn{width:100%;padding:13px 0;background:transparent;border:2px solid #ff8c00;border-radius:14px;color:#ff8c00;font-size:15px;font-weight:800;cursor:pointer}
.outline-btn:hover{background:rgba(255,140,0,0.1)}
.history-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:16px 20px;margin-bottom:16px}
.history-title{font-size:13px;font-weight:700;color:#888;margin-bottom:10px}
.history-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.history-date{font-size:13px;color:#666}
.history-score{font-size:13px;font-weight:700;color:#ff8c00}
.footer{text-align:center;font-size:12px;color:#444;margin-top:8px}
.screen{display:none}
.screen.on{display:block}

/* チャットモード */
.chat-header-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-top:8px}
.chat-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#1a1a3e,#0f3460);border:2px solid #ff8c00;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.chat-name{font-size:15px;font-weight:800;color:#fff}
.chat-status{font-size:11px;color:#ff8c00}
.q-progress{font-size:12px;color:#555;margin-left:auto;font-weight:700}

.chat-feed{display:flex;flex-direction:column;gap:12px;margin-bottom:16px;min-height:200px}

.bubble-wrap-bot{display:flex;align-items:flex-start;gap:8px}
.bubble-wrap-user{display:flex;justify-content:flex-end}
.bubble-avatar{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#1a1a3e,#0f3460);border:1px solid #ff8c0055;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:2px}
.bubble-bot{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:4px 16px 16px 16px;padding:12px 14px;font-size:14px;line-height:1.8;color:#e8e8e8;max-width:88%;white-space:pre-wrap}
.bubble-user{background:linear-gradient(135deg,#ff8c00,#ff4500);border-radius:16px 4px 16px 16px;padding:12px 14px;font-size:14px;line-height:1.8;color:#fff;max-width:88%}

/* タイピングカーソル */
.typing-cursor{display:inline-block;width:2px;height:1em;background:#ff8c00;margin-left:2px;animation:blink 0.7s step-end infinite;vertical-align:text-bottom}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* 選択肢 */
.opts-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.opt-btn{display:flex;align-items:flex-start;gap:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 14px;color:#e8e8e8;font-size:13px;text-align:left;cursor:pointer;line-height:1.7;width:100%;transition:background 0.15s}
.opt-btn:hover{background:rgba(255,140,0,0.1);border-color:rgba(255,140,0,0.3)}
.opt-btn.correct{background:rgba(0,200,100,0.12);border-color:rgba(0,200,100,0.5)}
.opt-btn.wrong{background:rgba(255,60,60,0.12);border-color:rgba(255,60,60,0.5)}
.opt-btn.dim{opacity:0.35}
.opt-btn:disabled{cursor:default}
.opt-num{min-width:24px;height:24px;border-radius:7px;background:rgba(255,140,0,0.15);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#ff8c00;flex-shrink:0;margin-top:1px}

/* アクションエリア */
.action-area{margin-bottom:12px}
.action-btn{width:100%;padding:13px 0;background:linear-gradient(135deg,#ff8c00,#ff4500);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 3px 14px rgba(255,140,0,0.3)}
.action-btn:hover{opacity:0.9}

/* チャット入力 */
.chat-input-area{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:10px 12px;display:flex;gap:8px;align-items:center}
.chat-input{flex:1;background:transparent;border:none;font-size:14px;color:#fff;outline:none;padding:4px 0}
.chat-input::placeholder{color:#444}
.chat-send{padding:8px 16px;background:linear-gradient(135deg,#ff8c00,#ff4500);border:none;border-radius:9px;color:#fff;font-size:13px;font-weight:800;cursor:pointer}
.chat-send:disabled{opacity:0.4;cursor:not-allowed}

/* 通常クイズ */
.progress-bar{height:4px;background:rgba(255,255,255,0.08);border-radius:4px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#ff8c00,#ff4500);border-radius:4px;transition:width 0.4s ease}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cat-tag{background:rgba(255,140,0,0.15);border:1px solid rgba(255,140,0,0.3);color:#ff8c00;border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700}
.q-count{font-size:13px;color:#666;font-weight:700}
.question-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:18px 16px;margin-bottom:14px}
.question-text{font-size:14px;line-height:1.8;color:#e8e8e8;white-space:pre-wrap}
.ex-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px;margin-bottom:8px}
.ex-label{font-size:18px;font-weight:800;margin-bottom:10px;color:#fff}
.ex-text{font-size:13px;line-height:1.9;color:#ccc;white-space:pre-wrap;margin-bottom:14px}
.norm-chat-area{background:rgba(0,0,0,0.3);border:1px solid rgba(255,140,0,0.2);border-radius:14px;padding:12px;margin-bottom:14px}
.norm-chat-head{font-size:13px;font-weight:700;color:#ff8c00;margin-bottom:10px}
.norm-chat-msgs{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.norm-bot-wrap{display:flex;align-items:flex-start;gap:8px}
.norm-user-wrap{display:flex;justify-content:flex-end}
.norm-bot-bubble{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:4px 12px 12px 12px;padding:8px 12px;font-size:13px;line-height:1.7;color:#e8e8e8;max-width:85%;white-space:pre-wrap}
.norm-user-bubble{background:linear-gradient(135deg,#ff8c00,#ff4500);border-radius:12px 4px 12px 12px;padding:8px 12px;font-size:13px;line-height:1.7;color:#fff;max-width:85%}
.norm-input-row{display:flex;gap:8px}
.norm-input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:9px 12px;font-size:13px;color:#fff;outline:none}
.norm-send{padding:9px 16px;background:linear-gradient(135deg,#ff8c00,#ff4500);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:800;cursor:pointer}
.next-btn{width:100%;padding:13px 0;background:linear-gradient(135deg,#ff8c00,#ff4500);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:800;cursor:pointer}

/* ハンズフリー */
.hf-box{background:rgba(255,255,255,0.04);border:2px solid rgba(255,140,0,0.3);border-radius:16px;padding:20px;margin-bottom:16px}
.mode-badge{display:inline-block;background:rgba(255,140,0,0.15);border:1px solid rgba(255,140,0,0.3);color:#ff8c00;border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;margin-bottom:14px}
.hf-label{font-size:13px;color:#888;margin-bottom:10px}
.hf-statement{background:rgba(255,255,255,0.06);border-radius:12px;padding:16px;font-size:15px;line-height:1.9;color:#fff;margin-bottom:18px;font-weight:600}
.hf-status{text-align:center;font-size:14px;color:#888;margin-bottom:10px;min-height:22px}
.hf-status.speaking{color:#ff8c00}
.hf-status.listening{color:#00c864}
.voice-wave{display:flex;align-items:center;justify-content:center;gap:4px;height:28px;margin-bottom:10px}
.voice-wave span{display:inline-block;width:4px;background:#00c864;border-radius:2px;animation:wave 1s ease-in-out infinite}
.voice-wave span:nth-child(2){animation-delay:0.1s}
.voice-wave span:nth-child(3){animation-delay:0.2s}
.voice-wave span:nth-child(4){animation-delay:0.3s}
.voice-wave span:nth-child(5){animation-delay:0.4s}
@keyframes wave{0%,100%{height:5px}50%{height:22px}}
.hf-btns{display:flex;gap:14px;margin-bottom:16px}
.hf-maru{flex:1;padding:30px 0;background:linear-gradient(135deg,#00c864,#00a050);border:none;border-radius:18px;color:#fff;font-size:36px;cursor:pointer;box-shadow:0 4px 20px rgba(0,200,100,0.3)}
.hf-batu{flex:1;padding:30px 0;background:linear-gradient(135deg,#ff4444,#cc2200);border:none;border-radius:18px;color:#fff;font-size:36px;cursor:pointer;box-shadow:0 4px 20px rgba(255,68,68,0.3)}
.hf-maru:disabled,.hf-batu:disabled{opacity:0.3;cursor:not-allowed;box-shadow:none}
.hf-result{background:rgba(0,0,0,0.4);border-radius:14px;padding:18px;margin-bottom:14px;text-align:center;display:none}
.hf-result-icon{font-size:52px;margin-bottom:8px}
.hf-result-text{font-size:13px;color:#ccc;line-height:1.8;white-space:pre-wrap}

/* リザルト */
.result-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:28px 20px;text-align:center;margin-bottom:16px}
.r-emoji{font-size:52px;margin-bottom:12px}
.r-score{font-size:42px;font-weight:900;color:#fff;line-height:1}
.r-pct{font-size:22px;font-weight:800;color:#ff8c00;margin-bottom:10px}
.r-msg{font-size:15px;color:#ccc;margin-bottom:20px;line-height:1.6}
.review-wrap{text-align:left;background:rgba(255,255,255,0.03);border-radius:12px;padding:12px 16px;margin-bottom:20px}
.rev-row{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;color:#aaa}
</style>
</head>
<body>
<div class="bg"></div>

<!-- HOME -->
<div id="home" class="screen on">
<div class="container">
  <div class="logo-wrap">
    <div class="logo-icon">A</div>
    <div>
      <div class="logo-title">AID式学習法</div>
      <div class="logo-sub">AI Interactive Dialogue</div>
    </div>
  </div>
  <div class="card">
    <div class="tag-row"><span class="tag">FP2級</span><span class="tag">学科対策</span></div>
    <div class="hero-text">楽しく、気分良く、</div>
    <div class="hero-text2">完全理解！</div>
    <div class="hero-sub">暗記じゃなくて「なぜ？」で理解する学習法</div>
    <div class="stats-row">
      <div class="stat"><div class="stat-num">5</div><div class="stat-label">問題数</div></div>
      <div class="stat-divider"></div>
      <div class="stat"><div class="stat-num" id="s-attempts">0</div><div class="stat-label">挑戦回数</div></div>
      <div class="stat-divider"></div>
      <div class="stat"><div class="stat-num" id="s-latest">--</div><div class="stat-label">最新スコア</div></div>
    </div>
    <button class="start-btn" onclick="startQuiz('chat')">🖤 クロちゃんと学習！</button>
    <button class="outline-btn" onclick="startQuiz('normal')" style="margin-bottom:10px">📝 通常クイズ</button>
    <button class="outline-btn" onclick="startQuiz('handsfree')">🎤 ハンズフリーモード（○×）</button>
  </div>
  <div class="history-card" id="hist-card" style="display:none">
    <div class="history-title">📊 最近の記録</div>
    <div id="hist-list"></div>
  </div>
  <div class="footer">クロちゃんと一緒に合格めざそ！🖤</div>
</div>
</div>

<!-- チャットモード -->
<div id="chat-mode" class="screen">
<div class="container">
  <div class="chat-header-bar">
    <div class="chat-avatar">🖤</div>
    <div>
      <div class="chat-name">クロちゃん</div>
      <div class="chat-status">FP2級 先生</div>
    </div>
    <div class="q-progress" id="chat-q-progress">1 / 5</div>
  </div>

  <div class="chat-feed" id="chat-feed"></div>

  <!-- 選択肢エリア -->
  <div id="opts-area" style="display:none">
    <div class="opts-wrap" id="chat-opts"></div>
  </div>

  <!-- アクションボタン -->
  <div class="action-area" id="action-area" style="display:none">
    <button class="action-btn" id="action-btn" onclick="onActionBtn()"></button>
  </div>

  <!-- チャット入力 -->
  <div class="chat-input-area" id="chat-input-area" style="display:none">
    <input class="chat-input" id="chat-in" placeholder="クロちゃんに質問してや！" onkeydown="if(event.key==='Enter')sendChatMsg()">
    <button class="chat-send" id="chat-send-btn" onclick="sendChatMsg()">送信</button>
  </div>
</div>
</div>

<!-- 通常クイズ -->
<div id="quiz" class="screen">
<div class="container">
  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
  <div class="quiz-header">
    <span class="cat-tag" id="q-cat"></span>
    <span class="q-count" id="q-num"></span>
  </div>
  <div class="question-card"><div class="question-text" id="q-text"></div></div>
  <div class="opts-wrap" id="opts"></div>
  <div class="ex-card" id="exbox" style="display:none">
    <div class="ex-label" id="ex-title"></div>
    <div class="ex-text" id="ex-text"></div>
    <div class="norm-chat-area">
      <div class="norm-chat-head">🖤 クロちゃんに質問する</div>
      <div class="norm-chat-msgs" id="norm-chat-msgs"></div>
      <div class="norm-input-row">
        <input class="norm-input" id="norm-chat-in" placeholder="なんでも聞いてや！" onkeydown="if(event.key==='Enter')sendNormChat()">
        <button class="norm-send" onclick="sendNormChat()">送信</button>
      </div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQ()"></button>
  </div>
</div>
</div>

<!-- ハンズフリー -->
<div id="quiz-hf" class="screen">
<div class="container">
  <div class="progress-bar"><div class="progress-fill" id="prog-hf"></div></div>
  <div class="quiz-header">
    <span class="cat-tag" id="q-cat-hf"></span>
    <span class="q-count" id="q-num-hf"></span>
  </div>
  <div class="hf-box">
    <div class="mode-badge" id="hf-badge">🎤 音声モード</div>
    <div class="hf-label">次の記述は○か×か？</div>
    <div class="hf-statement" id="hf-stmt"></div>
    <div class="hf-status" id="hf-status">問題を読み上げています...</div>
    <div class="voice-wave" id="voice-wave" style="display:none">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="hf-btns">
      <button class="hf-maru" id="btn-maru" onclick="hfAnswer(true)" disabled>⭕</button>
      <button class="hf-batu" id="btn-batu" onclick="hfAnswer(false)" disabled>❌</button>
    </div>
    <div class="hf-result" id="hf-result">
      <div class="hf-result-icon" id="hf-result-icon"></div>
      <div class="hf-result-text" id="hf-result-text"></div>
    </div>
    <button class="next-btn" id="next-btn-hf" onclick="nextHfQ()" style="display:none"></button>
  </div>
</div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
<div class="container">
  <div class="result-card">
    <div class="r-emoji" id="r-emoji"></div>
    <div class="r-score" id="r-score"></div>
    <div class="r-pct" id="r-pct"></div>
    <div class="r-msg" id="r-msg"></div>
    <div class="review-wrap" id="review"></div>
    <button class="start-btn" onclick="goHome()">もう一回挑戦！🔥</button>
  </div>
  <div class="footer">AID式学習法 © amadopapa</div>
</div>
</div>

<script>
/* ===== 問題データ ===== */
var Qs = [

/* ===================================================
   チャットモード
   =================================================== */
function chatFeed(){return document.getElementById('chat-feed');}

function addBotBubble(text, onDone){
  var feed=chatFeed();
  var wrap=document.createElement('div');
  wrap.className='bubble-wrap-bot';
  var av=document.createElement('div');av.className='bubble-avatar';av.textContent='🖤';
  var bub=document.createElement('div');bub.className='bubble-bot';
  wrap.appendChild(av);wrap.appendChild(bub);
  feed.appendChild(wrap);
  scrollFeed();
  typeText(bub, text, onDone);
}

function addUserBubble(text){
  var feed=chatFeed();
  var wrap=document.createElement('div');
  wrap.className='bubble-wrap-user';
  var bub=document.createElement('div');bub.className='bubble-user';bub.textContent=text;
  wrap.appendChild(bub);
  feed.appendChild(wrap);
  scrollFeed();
}

function scrollFeed(){
  setTimeout(function(){window.scrollTo(0,document.body.scrollHeight);},50);
}

/* タイピングアニメーション */
function typeText(el, text, onDone){
  el.textContent='';
  var cursor=document.createElement('span');
  cursor.className='typing-cursor';
  el.appendChild(cursor);
  var i=0;
  var speed=56; // ms/文字
  function next(){
    if(i<text.length){
      el.insertBefore(document.createTextNode(text[i]),cursor);
      i++;
      scrollFeed();
      typingTimer=setTimeout(next, speed);
    } else {
      cursor.remove();
      if(onDone) onDone();
    }
  }
  next();
}

function setActionBtn(label, show){
  var area=document.getElementById('action-area');
  var btn=document.getElementById('action-btn');
  if(show){btn.textContent=label;area.style.display='block';}
  else{area.style.display='none';}
}

function showChatInput(on){
  document.getElementById('chat-input-area').style.display=on?'flex':'none';
  if(on) setTimeout(function(){document.getElementById('chat-in').focus();},100);
}

function showOpts(on){
  document.getElementById('opts-area').style.display=on?'block':'none';
}

/* チャットモード開始 */
function startChatMode(){
  document.getElementById('chat-feed').innerHTML='';
  showOpts(false);
  showChatInput(false);
  setActionBtn('',false);
  updateChatProgress();
  chatPhase='intro';

  var q=Qs[cur];
  var intro='よっしゃ！問題'+( cur+1)+'問目いくで〜！\nカテゴリは「'+q.cat+'」やで！\n\nゆっくり読んでな！';
  addBotBubble(intro, function(){
    setTimeout(function(){
      chatPhase='question';
      addBotBubble(q.q, function(){
        setActionBtn('選択肢を見る →', true);
      });
    }, 400);
  });
}

function updateChatProgress(){
  document.getElementById('chat-q-progress').textContent=(cur+1)+' / '+Qs.length;
}

var actionState=''; // 'show-opts' | 'next-q' | 'result'

function onActionBtn(){
  if(actionState==='show-opts'){
    showChoices();
  } else if(actionState==='next-q'){
    nextChatQ();
  } else if(actionState==='result'){
    finish();
  } else {
    // デフォルト：選択肢表示
    showChoices();
  }
}

function showChoices(){
  setActionBtn('',false);
  var q=Qs[cur];
  var optsEl=document.getElementById('chat-opts');
  optsEl.innerHTML=q.opts.map(function(o,i){
    return '<button class="opt-btn" id="co'+i+'" onclick="chatPick('+i+')"><span class="opt-num">'+(i+1)+'</span><span>'+o+'</span></button>';
  }).join('');
  showOpts(true);
  chatPhase='opts';
  scrollFeed();
  // クロちゃんのひとこと
  addBotBubble('どれやと思う？直感でもええで！🤔');
}

function chatPick(idx){
  showOpts(false);
  var q=Qs[cur];
  var ok=idx===q.ans;
  if(ok) score++;
  answers.push({q:cur,sel:idx,ok:ok});
  chatPhase='answered';

  // ユーザーの選択表示
  addUserBubble((idx+1)+'番！「'+q.opts[idx]+'」');

  setTimeout(function(){
    var reactionMsg = ok
      ? '🎉 正解やで！めっちゃええやん！\n\n'+q.ex
      : '💦 惜しい！'+( idx+1)+'番は不正解や〜\n\n正解は'+(q.ans+1)+'番「'+q.opts[q.ans]+'」やで！\n\n'+q.ex;

    addBotBubble(reactionMsg, function(){
      showChatInput(true);
      chatPhase='chat';
      // 次へボタン
      if(cur+1<Qs.length){
        actionState='next-q';
        setActionBtn('次の問題へ →', true);
      } else {
        actionState='result';
        setActionBtn('結果を見る 🏁', true);
      }
      addBotBubble('わからんことあったら何でも聞いてや！🖤');
    });
  }, 300);
}

function nextChatQ(){
  setActionBtn('',false);
  showChatInput(false);
  cur++;
  chatApiHist=[];
  startChatMode();
}

async function sendChatMsg(){
  var inp=document.getElementById('chat-in');
  var txt=inp.value.trim();
  if(!txt) return;
  inp.value='';
  document.getElementById('chat-send-btn').disabled=true;

  addUserBubble(txt);
  chatApiHist.push({role:'user',content:txt});

  var q=Qs[cur];
  var sys='あなたは「クロちゃん」というFP2級の先生です。関西弁でフレンドリーに、楽しく、わかりやすく教えてください。\n今取り組んでいる問題：\nカテゴリ：'+q.cat+'\n問題：'+q.q+'\n正解：選択肢'+(q.ans+1)+'番「'+q.opts[q.ans]+'」\n解説：'+q.ex+'\n\n「なぜそうなるか」を日常のたとえや具体例で200字以内で答えてください。';

  // ローディング表示
  var feed=chatFeed();
  var loadWrap=document.createElement('div');loadWrap.className='bubble-wrap-bot';loadWrap.id='chat-loading';
  var av=document.createElement('div');av.className='bubble-avatar';av.textContent='🖤';
  var bub=document.createElement('div');bub.className='bubble-bot';bub.textContent='考え中やで...⏳';
  loadWrap.appendChild(av);loadWrap.appendChild(bub);
  feed.appendChild(loadWrap);
  scrollFeed();

  try{
    var r=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:chatApiHist,system:sys})
    });
    var d=await r.json();
    var rep=d.reply||'ごめん、うまく答えられへんかった！';
    chatApiHist.push({role:'assistant',content:rep});
    var loading=document.getElementById('chat-loading');
    if(loading) loading.remove();
    addBotBubble(rep);
  }catch(e){
    var loading=document.getElementById('chat-loading');
    if(loading) loading.remove();
    addBotBubble('通信エラーやで！もう一回試してみて！');
  }
  document.getElementById('chat-send-btn').disabled=false;
}

function pick(idx){
  var q=Qs[cur];
  var ok=idx===q.ans;
  if(ok) score++;
  answers.push({q:cur,sel:idx,ok:ok});
  for(var i=0;i<q.opts.length;i++){
    var b=document.getElementById('o'+i);
    b.disabled=true;
    b.classList.remove('correct','wrong','dim');
    if(i===q.ans) b.classList.add('correct');
    else if(i===idx) b.classList.add('wrong');
    else b.classList.add('dim');
  }
  document.getElementById('ex-title').textContent=ok?'🎉 正解！！':'💦 不正解...';
  document.getElementById('ex-text').textContent=q.ex;
  document.getElementById('next-btn').textContent=cur+1<Qs.length?'次の問題へ →':'結果を見る 🏁';
  document.getElementById('exbox').style.display='block';
}

   ハンズフリー
   =================================================== */
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
var recognition=null;
var voiceOK=!!SR;
var synth=window.speechSynthesis;

function speak(text,onEnd){
  if(!synth){if(onEnd)onEnd();return;}
  synth.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP';u.rate=0.9;
  u.onend=function(){if(onEnd)onEnd();};
  u.onerror=function(){if(onEnd)onEnd();};
  synth.speak(u);
}

function initRec(){
  if(!voiceOK)return;
  recognition=new SR();
  recognition.lang='ja-JP';recognition.continuous=false;recognition.interimResults=false;
  recognition.onresult=function(e){
    var txt=e.results[0][0].transcript;
    stopListen();
    if(txt.includes('まる')||txt.includes('マル')||txt.includes('○')){hfAnswer(true);}
    else if(txt.includes('ばつ')||txt.includes('バツ')||txt.includes('×')||txt.includes('ペケ')){hfAnswer(false);}
    else{setHfStatus('「まる」か「ばつ」で答えてや！もう一回！','listening');startListen();}
  };
  recognition.onerror=function(){stopListen();enableHfBtns();setHfStatus('音声認識エラー。ボタンで答えてね。','');};
}
function startListen(){
  if(!voiceOK||!recognition)return;
  document.getElementById('voice-wave').style.display='flex';
  setHfStatus('「まる」か「ばつ」と言ってや！🎤','listening');
  try{recognition.start();}catch(e){}
}
function stopListen(){
  if(!voiceOK||!recognition)return;
  document.getElementById('voice-wave').style.display='none';
  try{recognition.stop();}catch(e){}
}
function setHfStatus(msg,cls){
  var el=document.getElementById('hf-status');
  el.textContent=msg;el.className='hf-status'+(cls?' '+cls:'');
}
function enableHfBtns(){document.getElementById('btn-maru').disabled=false;document.getElementById('btn-batu').disabled=false;}
function disableHfBtns(){document.getElementById('btn-maru').disabled=true;document.getElementById('btn-batu').disabled=true;}

function renderHfQ(){
  var q=QsOX[cur];
  document.getElementById('prog-hf').style.width=((cur+1)/QsOX.length*100)+'%';
  document.getElementById('q-cat-hf').textContent=q.cat;
  document.getElementById('q-num-hf').textContent=(cur+1)+' / '+QsOX.length;
  document.getElementById('hf-stmt').textContent=q.stmt;
  document.getElementById('hf-result').style.display='none';
  document.getElementById('next-btn-hf').style.display='none';
  disableHfBtns();
  document.getElementById('voice-wave').style.display='none';
  setHfStatus('問題を読み上げています...','speaking');
  speak('問題。'+q.stmt+'。これは○ですか、×ですか？',function(){
    enableHfBtns();
    if(voiceOK){setTimeout(startListen,500);}
    else{setHfStatus('⭕か❌をタップして答えてね！','');}
  });
}

function hfAnswer(ans){
  stopListen();disableHfBtns();
  var q=QsOX[cur];
  var ok=(ans===q.ans);
  if(ok)score++;
  answers.push({q:cur,sel:ans,ok:ok});
  document.getElementById('hf-result').style.display='block';
  document.getElementById('hf-result-icon').textContent=ok?'⭕':'❌';
  document.getElementById('hf-result-text').textContent=q.ex;
  var nb=document.getElementById('next-btn-hf');
  nb.textContent=cur+1<QsOX.length?'次の問題へ →':'結果を見る 🏁';
  nb.style.display='block';
  speak(ok?'正解！'+q.ex:'不正解！'+q.ex);
  setHfStatus(ok?'🎉 正解！':'💦 不正解...','');
}

function nextHfQ(){
  synth&&synth.cancel();
  if(cur+1<QsOX.length){cur++;renderHfQ();}
  else finish();
}

/* ===================================================
   共通
   =================================================== */
function finish(){
  synth&&synth.cancel();
  var total=mode==='handsfree'?QsOX.length:Qs.length;
  var rec={date:new Date().toLocaleDateString('ja-JP'),score:score,total:total,mode:mode};
  hist=[rec].concat(hist).slice(0,10);
  try{localStorage.setItem('aid_fp2_hist',JSON.stringify(hist));}catch(e){}
  var pct=Math.round(score/total*100);
  document.getElementById('r-emoji').textContent=pct>=80?'🎉':pct>=60?'💪':'😅';
  document.getElementById('r-score').textContent=score+' / '+total;
  document.getElementById('r-pct').textContent=pct+'%';
  document.getElementById('r-msg').textContent=pct>=80?'めっちゃええやん！この調子で2級合格や！':pct>=60?'惜しい！あと一歩やで！もう一回チャレンジ！':'ドンマイ！間違いが宝や！解説読んで完全理解しよ！';
  var qs=mode==='handsfree'?QsOX:Qs;
  document.getElementById('review').innerHTML=answers.map(function(a,i){
    return '<div class="rev-row"><span>'+(a.ok?'✅':'❌')+'</span><span>問'+(i+1)+'：'+qs[a.q].cat+'</span></div>';
  }).join('');
  show('result');
}

function goHome(){synth&&synth.cancel();updateHome();show('home');}

updateHome();
</script>
