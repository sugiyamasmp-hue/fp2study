<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AID式学習法 FP2級</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;color:#eee;font-family:sans-serif;min-height:100vh;padding:16px}
h1{color:#ff8c00;font-size:22px;margin-bottom:4px}
.sub{color:#ff8c00;font-size:11px;margin-bottom:20px;opacity:0.8}
.card{background:#16213e;border:1px solid #0f3460;border-radius:16px;padding:20px;margin-bottom:16px}
.tag{background:#ff8c0022;border:1px solid #ff8c0055;color:#ff8c00;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700;margin-right:6px}
.big{font-size:26px;font-weight:900;color:#fff;margin:8px 0}
.orange{color:#ff8c00}
.sub2{font-size:13px;color:#888;margin-bottom:16px}
.stats{display:flex;background:#0f3460;border-radius:10px;padding:12px 0;margin-bottom:16px}
.stat{flex:1;text-align:center}
.stat-n{font-size:20px;font-weight:800;color:#ff8c00}
.stat-l{font-size:11px;color:#666;margin-top:2px}
.divider{width:1px;background:#ffffff22}
.api-box{background:#ff8c0011;border:1px solid #ff8c0033;border-radius:10px;padding:12px;margin-bottom:14px}
.api-label{font-size:12px;color:#ff8c00;font-weight:700;margin-bottom:8px}
.api-row{display:flex;gap:8px}
.api-input{flex:1;background:#ffffff11;border:1px solid #ffffff22;border-radius:8px;padding:8px;font-size:12px;color:#fff;outline:none}
.api-btn{padding:8px 14px;background:#ff8c0044;border:1px solid #ff8c00;border-radius:8px;color:#ff8c00;font-weight:800;cursor:pointer;font-size:13px}
.api-ok{font-size:12px;color:#4caf50;margin-top:6px;display:none}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#ff8c00,#ff4500);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:4px}
.btn:hover{opacity:0.9}
.hist-title{font-size:13px;color:#888;font-weight:700;margin-bottom:8px}
.hist-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #ffffff11;font-size:13px}
.hist-score{color:#ff8c00;font-weight:700}
.screen{display:none}
.screen.on{display:block}
.progress{height:4px;background:#ffffff11;border-radius:4px;margin-bottom:14px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#ff8c00,#ff4500);border-radius:4px;transition:width 0.3s}
.qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cat-tag{background:#ff8c0022;border:1px solid #ff8c0055;color:#ff8c00;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700}
.qnum{font-size:13px;color:#666;font-weight:700}
.qbox{background:#16213e;border:1px solid #0f3460;border-radius:14px;padding:16px;margin-bottom:12px}
.qtext{font-size:14px;line-height:1.8;color:#ddd;white-space:pre-wrap}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.opt{display:flex;align-items:flex-start;gap:10px;background:#16213e;border:1px solid #0f3460;border-radius:10px;padding:12px;color:#ddd;font-size:13px;text-align:left;cursor:pointer;line-height:1.6;width:100%}
.opt:hover{background:#0f3460}
.opt.correct{background:#00c86422;border-color:#00c864aa}
.opt.wrong{background:#ff444422;border-color:#ff4444aa}
.opt.dim{opacity:0.35}
.opt-n{min-width:22px;height:22px;border-radius:6px;background:#ff8c0022;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#ff8c00;flex-shrink:0;margin-top:1px}
.exbox{background:#16213e;border:1px solid #0f3460;border-radius:14px;padding:16px;margin-bottom:10px}
.ex-title{font-size:17px;font-weight:800;color:#fff;margin-bottom:10px}
.ex-text{font-size:13px;line-height:1.9;color:#ccc;white-space:pre-wrap;margin-bottom:14px}
.chat-box{background:#0a0a1a;border:1px solid #ff8c0033;border-radius:12px;padding:12px;margin-bottom:12px}
.chat-head{font-size:13px;font-weight:700;color:#ff8c00;margin-bottom:8px}
.chat-msgs{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.bot-wrap{display:flex;align-items:flex-start;gap:6px}
.user-wrap{display:flex;justify-content:flex-end}
.bot-msg{background:#ffffff0d;border:1px solid #ffffff11;border-radius:4px 12px 12px 12px;padding:8px 10px;font-size:13px;line-height:1.7;color:#ddd;max-width:85%;white-space:pre-wrap}
.user-msg{background:linear-gradient(135deg,#ff8c00,#ff4500);border-radius:12px 4px 12px 12px;padding:8px 10px;font-size:13px;line-height:1.7;color:#fff;max-width:85%}
.chat-row{display:flex;gap:6px}
.chat-input{flex:1;background:#ffffff0d;border:1px solid #ffffff22;border-radius:8px;padding:8px 10px;font-size:13px;color:#fff;outline:none}
.chat-send{padding:8px 14px;background:linear-gradient(135deg,#ff8c00,#ff4500);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:800;cursor:pointer}
.next-btn{width:100%;padding:13px;background:linear-gradient(135deg,#ff8c00,#ff4500);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:800;cursor:pointer}
.result-box{background:#16213e;border:1px solid #0f3460;border-radius:16px;padding:28px 20px;text-align:center;margin-bottom:16px}
.r-emoji{font-size:50px;margin-bottom:12px}
.r-score{font-size:40px;font-weight:900;color:#fff}
.r-pct{font-size:22px;font-weight:800;color:#ff8c00;margin-bottom:10px}
.r-msg{font-size:14px;color:#ccc;margin-bottom:18px;line-height:1.6}
.review{text-align:left;background:#0f3460;border-radius:10px;padding:12px;margin-bottom:18px}
.rev-row{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid #ffffff11;font-size:13px;color:#aaa;align-items:center}
.footer{text-align:center;font-size:12px;color:#444;margin-top:8px}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen on">
  <h1>AID式学習法</h1>
  <div class="sub">AI Interactive Dialogue</div>
  <div class="card">
    <div><span class="tag">FP2級</span><span class="tag">学科対策</span></div>
    <div class="big">楽しく、気分良く、</div>
    <div class="big orange">完全理解！</div>
    <div class="sub2">暗記じゃなくて「なぜ？」で理解する学習法</div>
    <div class="stats">
      <div class="stat"><div class="stat-n">5</div><div class="stat-l">問題数</div></div>
      <div class="divider"></div>
      <div class="stat"><div class="stat-n" id="s-attempts">0</div><div class="stat-l">挑戦回数</div></div>
      <div class="divider"></div>
      <div class="stat"><div class="stat-n" id="s-latest">--</div><div class="stat-l">最新スコア</div></div>
    </div>
    <div class="api-box">
      <div class="api-label">🔑 Anthropic APIキー（チャット機能に必要）</div>
      <div class="api-row">
        <input class="api-input" type="password" id="api-input" placeholder="sk-ant-...">
        <button class="api-btn" onclick="saveKey()">設定</button>
      </div>
      <div class="api-ok" id="api-ok">APIキー設定済み！チャット機能が使えるで🎉</div>
    </div>
    <button class="btn" onclick="startQuiz()">スタート！🔥</button>
  </div>
  <div class="card" id="hist-card" style="display:none">
    <div class="hist-title">📊 最近の記録</div>
    <div id="hist-list"></div>
  </div>
  <div class="footer">クロちゃんと一緒に合格めざそ！🖤</div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="progress"><div class="progress-bar" id="prog"></div></div>
  <div class="qhead">
    <span class="cat-tag" id="q-cat"></span>
    <span class="qnum" id="q-num"></span>
  </div>
  <div class="qbox"><div class="qtext" id="q-text"></div></div>
  <div class="opts" id="opts"></div>
  <div class="exbox" id="exbox" style="display:none">
    <div class="ex-title" id="ex-title"></div>
    <div class="ex-text" id="ex-text"></div>
    <div class="chat-box">
      <div class="chat-head">🖤 クロちゃんに質問する</div>
      <div class="chat-msgs" id="chat-msgs"></div>
      <div class="chat-row">
        <input class="chat-input" id="chat-in" placeholder="なんでも聞いてや！" onkeydown="if(event.key==='Enter')sendChat()">
        <button class="chat-send" onclick="sendChat()">送信</button>
      </div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQ()"></button>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="result-box">
    <div class="r-emoji" id="r-emoji"></div>
    <div class="r-score" id="r-score"></div>
    <div class="r-pct" id="r-pct"></div>
    <div class="r-msg" id="r-msg"></div>
    <div class="review" id="review"></div>
    <button class="btn" onclick="goHome()">もう一回挑戦！🔥</button>
  </div>
  <div class="footer">AID式学習法 © amadopapa</div>
</div>

<script>
var Qs=[
  {cat:"ライフ・社会保険",q:"協会けんぽの被保険者に関する記述の空欄にあてはまる組合せとして、最も適切なものはどれか。\n\n短時間労働者のうち次のいずれかに該当する者は被保険者とならない。\n①1週間の所定労働時間が（イ）未満\n②所定内賃金が月額（ウ）未満\n③学生\n\nまた所定労働時間・日数が通常の労働者の（ア）未満であること。",opts:["ア：3分の2　イ：20時間　ウ：5万8千円","ア：3分の2　イ：25時間　ウ：8万8千円","ア：4分の3　イ：20時間　ウ：8万8千円","ア：4分の3　イ：25時間　ウ：5万8千円"],ans:2,ex:"✅ ア：4分の3\n✅ イ：20時間\n✅ ウ：8万8千円（106万円の壁のライン！）\n\n「ハチハチ（88）で切れる！」で覚えよう！"},
  {cat:"ライフ・社会保険",q:"労働者災害補償保険に関する次の記述のうち、最も不適切なものはどれか。",opts:["労災保険の適用を受ける労働者には、アルバイトやパートタイマーも含まれる","労災保険率は、適用事業に従事する労働者数に応じて定められている","業務上の傷病が治癒したときに一定の障害が残り障害等級に該当する場合、障害補償給付が支給される","業務災害で労働者が死亡した場合、遺族補償年金または遺族補償一時金が支給される"],ans:1,ex:"2番が不適切！\n\n✅ 労災保険率は「労働者数」ではなく「業種」で決まる！\n\n労災は雇用形態に関係なく全員対象！"},
  {cat:"タックス",q:"わが国の税制に関する次の記述のうち、最も不適切なものはどれか。",opts:["所得税では課税対象となる所得を10種類に区分し種類ごとに計算する","相続税では税務署長が納付税額を決定する賦課課税方式が採用されている","消費税は間接税に該当する","法人税は国税、不動産取得税は地方税に該当する"],ans:1,ex:"2番が不適切！\n\n✅ 相続税は「申告納税方式」！自分で計算して申告！\n\n📝 申告納税方式：所得税・相続税・贈与税・法人税\n📬 賦課課税方式：固定資産税・住民税・不動産取得税"},
  {cat:"タックス",q:"所得税における損益通算に関する次の記述のうち、最も適切なものはどれか。",opts:["不動産所得の損失のうち土地取得の負債利子は給与所得と損益通算できる","先物取引の雑所得の損失は不動産所得と損益通算できる","生活用自家用車を売却した譲渡所得の損失は給与所得と損益通算できる","コンサルティング事業の事業所得の損失は不動産所得と損益通算できる"],ans:3,ex:"4番が正解！\n\n✅ 事業所得の損失は他の所得と損益通算できる！\n\n損益通算できる所得は「不事山譲（ふじさんじょう）」！\n不動産・事業・山林・譲渡の4つや！"},
  {cat:"タックス",q:"所得税における所得控除に関する次の記述のうち、最も不適切なものはどれか。",opts:["19歳以上23歳未満の扶養親族は特定扶養親族に該当する","70歳以上の扶養親族は老人扶養親族に該当する","合計所得金額が1,000万円を超える場合、配偶者控除の適用を受けることはできない","婚姻届を提出していなくても内縁関係にある者は控除対象配偶者に該当する"],ans:3,ex:"4番が不適切！\n\n✅ 内縁関係は配偶者控除の対象外！戸籍上の配偶者のみ！\n\n健康保険はOKでも税金はNG！\n「健康保険は人情、税金は法律」で覚えよう！"},
];

var cur=0,score=0,answers=[],hist=JSON.parse(localStorage.getItem('aid_hist')||'[]'),apiKey='',chatHist=[];

function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on')});document.getElementById(id).classList.add('on')}

function saveKey(){
  var v=document.getElementById('api-input').value.trim();
  if(!v)return;
  apiKey=v;
  document.getElementById('api-ok').style.display='block';
}

function updateHome(){
  document.getElementById('s-attempts').textContent=hist.length;
  if(hist.length>0){
    document.getElementById('s-latest').textContent=Math.round(hist[0].score/hist[0].total*100)+'%';
    document.getElementById('hist-card').style.display='block';
    document.getElementById('hist-list').innerHTML=hist.slice(0,3).map(function(h){
      return '<div class="hist-row"><span>'+h.date+'</span><span class="hist-score">'+h.score+'/'+h.total+' ('+Math.round(h.score/h.total*100)+'%)</span></div>';
    }).join('');
  }
}

function startQuiz(){cur=0;score=0;answers=[];show('quiz');renderQ()}

function renderQ(){
  var q=Qs[cur];
  document.getElementById('prog').style.width=((cur+1)/Qs.length*100)+'%';
  document.getElementById('q-cat').textContent=q.cat;
  document.getElementById('q-num').textContent=(cur+1)+' / '+Qs.length;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('exbox').style.display='none';
  chatHist=[];
  document.getElementById('chat-msgs').innerHTML='';
  addBot('なんか気になることあったら何でも聞いてや！🖤');
  var opts=document.getElementById('opts');
  opts.innerHTML=q.opts.map(function(o,i){
    return '<button class="opt" id="o'+i+'" onclick="pick('+i+')"><span class="opt-n">'+(i+1)+'</span><span>'+o+'</span></button>';
  }).join('');
}

function pick(idx){
  var q=Qs[cur];
  var ok=idx===q.ans;
  if(ok)score++;
  answers.push({q:cur,sel:idx,ok:ok});
  for(var i=0;i<q.opts.length;i++){
    var b=document.getElementById('o'+i);
    b.disabled=true;
    if(i===q.ans)b.classList.add('correct');
    else if(i===idx)b.classList.add('wrong');
    else b.classList.add('dim');
  }
  document.getElementById('ex-title').textContent=ok?'🎉 正解！！':'💦 不正解...';
  document.getElementById('ex-text').textContent=q.ex;
  document.getElementById('next-btn').textContent=cur+1<Qs.length?'次の問題へ →':'結果を見る 🏁';
  document.getElementById('exbox').style.display='block';
}

function nextQ(){
  if(cur+1<Qs.length){cur++;renderQ();}
  else finish();
}

function finish(){
  var rec={date:new Date().toLocaleDateString('ja-JP'),score:score,total:Qs.length};
  hist=[rec].concat(hist).slice(0,10);
  localStorage.setItem('aid_hist',JSON.stringify(hist));
  var pct=Math.round(score/Qs.length*100);
  document.getElementById('r-emoji').textContent=pct>=80?'🎉':pct>=60?'💪':'😅';
  document.getElementById('r-score').textContent=score+' / '+Qs.length;
  document.getElementById('r-pct').textContent=pct+'%';
  document.getElementById('r-msg').textContent=pct>=80?'めっちゃええやん！この調子で2級合格や！':pct>=60?'惜しい！あと一歩やで！':'ドンマイ！間違いが宝や！解説読んで完全理解しよ！';
  document.getElementById('review').innerHTML=answers.map(function(a,i){
    return '<div class="rev-row"><span>'+(a.ok?'✅':'❌')+'</span><span>問'+(i+1)+'：'+Qs[a.q].cat+'</span></div>';
  }).join('');
  show('result');
}

function goHome(){updateHome();show('home')}

function addBot(txt){
  var m=document.getElementById('chat-msgs');
  var d=document.createElement('div');d.className='bot-wrap';
  d.innerHTML='<div style="font-size:18px;flex-shrink:0">🖤</div><div class="bot-msg">'+txt+'</div>';
  m.appendChild(d);m.scrollTop=m.scrollHeight;
}

function addUser(txt){
  var m=document.getElementById('chat-msgs');
  var d=document.createElement('div');d.className='user-wrap';
  d.innerHTML='<div class="user-msg">'+txt+'</div>';
  m.appendChild(d);m.scrollTop=m.scrollHeight;
}

function removeLast(){
  var m=document.getElementById('chat-msgs');
  if(m.lastChild)m.removeChild(m.lastChild);
}

async function sendChat(){
  var inp=document.getElementById('chat-in');
  var txt=inp.value.trim();
  if(!txt)return;
  inp.value='';
  addUser(txt);
  chatHist.push({role:'user',content:txt});
  if(!apiKey){addBot('APIキーが設定されてへんで！ホーム画面で入力してや！🔑');return;}
  addBot('考え中やで...⏳');
  var q=Qs[cur];
  var sys='あなたは「クロちゃん」というFP2級の先生です。関西弁でフレンドリーに楽しく教えてください。\n今の問題：'+q.cat+'\n問題：'+q.q+'\n正解：'+q.opts[q.ans]+'\n解説：'+q.ex+'\n200字以内で簡潔に答えてください。';
  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:chatHist})
    });
    var d=await r.json();
    var rep=d.content&&d.content[0]?d.content[0].text:'ごめん、うまく答えられへんかった！';
    chatHist.push({role:'assistant',content:rep});
    removeLast();addBot(rep);
  }catch(e){removeLast();addBot('通信エラーやで！APIキーを確認してな！');}
}

updateHome();
</script>
</body>
</html>
